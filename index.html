    <h1>Kalenderblatt vom <span class="date"></span></h1>
     <p>
        Der <span class="date"></span> ist ein <span class = "weekday"></span> und
        zwar der <span id="counter"></span> <span class="weekday"></span> im Monat
        <span class="month1"></span> des Jahres <span id="year1"></span>. Es handelt
        sich um den <span id="dayOfYear"></span>. Tag des Jahres, was bedeutet, dass es noch <span id="daysLeft"></span> Tage bis
        zum Jahresende sind. Der Monat <span class="month1"></span> hat insgesamt <span id="daysInMonth"></span> Tage.
      </p>
